apiVersion: apps/v1
kind: Deployment
metadata:
  name: gunals-app
  labels:
    app: gunals-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gunals-app

  template:
    metadata:
      labels:
        app: gunals-app

    spec:
      containers:
      - name: gunals-container
        image: gunalsenthil/gunals:v12
        imagePullPolicy: Always

        ports:
        - containerPort: 80
